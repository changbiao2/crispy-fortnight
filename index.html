<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>优品商城 - 品质生活，优选好物</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#FF6B35',
            'primary-dark': '#E55A2B',
            'primary-light': '#FF8F6B',
            secondary: '#007AFF',
            success: '#34C759',
            warning: '#FF9500',
            danger: '#FF3B30',
            info: '#5AC8FA',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #333; background: #f5f5f5; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    .gradient-primary { background: linear-gradient(135deg, #FF6B35 0%, #FF8F6B 100%); }
    .gradient-blue { background: linear-gradient(135deg, #007AFF 0%, #5AC8FA 100%); }
    .gradient-green { background: linear-gradient(135deg, #34C759 0%, #7AE09A 100%); }
    .gradient-purple { background: linear-gradient(135deg, #AF52DE 0%, #D48EF6 100%); }
    .card-shadow { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .card-hover { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
    .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .fade-enter-active, .fade-leave-active { transition: opacity 0.3s ease; }
    .fade-enter-from, .fade-leave-to { opacity: 0; }
    .slide-enter-active, .slide-leave-active { transition: transform 0.3s ease, opacity 0.3s ease; }
    .slide-enter-from { transform: translateY(20px); opacity: 0; }
    .slide-leave-to { transform: translateY(-20px); opacity: 0; }
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: skeleton-loading 1.5s infinite; }
    @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .animate-pulse-slow { animation: pulse 2s ease-in-out infinite; }
    @keyframes bounce-in { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.05); } 70% { transform: scale(0.9); } 100% { transform: scale(1); opacity: 1; } }
    .bounce-in { animation: bounce-in 0.5s ease; }
    .toast-enter { animation: toast-in 0.3s ease; }
    @keyframes toast-in { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #FF6B35 !important; box-shadow: 0 0 0 3px rgba(255,107,53,0.15); }
    .btn-primary { background: linear-gradient(135deg, #FF6B35, #FF8F6B); color: white; transition: all 0.3s; }
    .btn-primary:hover { background: linear-gradient(135deg, #E55A2B, #FF6B35); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,107,53,0.4); }
    .btn-primary:active { transform: scale(0.98); }
    .price-color { color: #FF3B30; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    .product-img-wrap { position: relative; overflow: hidden; }
    .product-img-wrap img { transition: transform 0.5s ease; }
    .product-img-wrap:hover img { transform: scale(1.08); }
    .menu-item { transition: all 0.2s; border-left: 3px solid transparent; }
    .menu-item:hover, .menu-item.active { background: rgba(255,107,53,0.08); border-left-color: #FF6B35; color: #FF6B35; }
    [v-cloak] { display: none; }
  </style>
</head>
<body>
<div id="app" v-cloak>
  <!-- Toast Notifications -->
  <div class="fixed top-4 left-1/2 -translate-x-1/2 z-[9999] space-y-2">
    <div v-for="(t, i) in toasts" :key="i" class="toast-enter flex items-center gap-3 px-5 py-3 rounded-lg shadow-lg text-white min-w-[300px]"
         :class="{'bg-green-500': t.type==='success','bg-red-500': t.type==='error','bg-orange-500': t.type==='warning','bg-blue-500': t.type==='info'}">
      <i :class="{'fa-check-circle': t.type==='success','fa-exclamation-circle': t.type==='error','fa-exclamation-triangle': t.type==='warning','fa-info-circle': t.type==='info'}" class="fas text-lg"></i>
      <span class="flex-1 text-sm">{{ t.message }}</span>
      <button @click="toasts.splice(i,1)" class="opacity-70 hover:opacity-100"><i class="fas fa-times"></i></button>
    </div>
  </div>

  <!-- Modal -->
  <div v-if="modal.show" class="fixed inset-0 z-[9998] flex items-center justify-center p-4" @click.self="modal.show=false">
    <div class="fixed inset-0 bg-black/50 backdrop-blur-sm"></div>
    <div class="relative bg-white rounded-xl shadow-2xl max-w-md w-full p-6 bounce-in">
      <button @click="modal.show=false" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600"><i class="fas fa-times text-lg"></i></button>
      <div class="text-center">
        <div class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"
             :class="{'bg-green-100 text-green-500': modal.type==='success','bg-red-100 text-red-500': modal.type==='error','bg-orange-100 text-orange-500': modal.type==='warning','bg-blue-100 text-blue-500': modal.type==='confirm'}">
          <i :class="{'fa-check': modal.type==='success','fa-times': modal.type==='error','fa-exclamation': modal.type==='warning','fa-question': modal.type==='confirm'}" class="fas text-2xl"></i>
        </div>
        <h3 class="text-lg font-semibold mb-2">{{ modal.title }}</h3>
        <p class="text-gray-500 text-sm mb-6">{{ modal.message }}</p>
        <div class="flex gap-3 justify-center">
          <button v-if="modal.type==='confirm'" @click="modal.show=false" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">取消</button>
          <button @click="modal.onConfirm?.(); modal.show=false" class="px-6 py-2 btn-primary rounded-lg">确定</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ==================== FRONTEND PAGES ==================== -->
  <template v-if="!currentPage.startsWith('admin')">
    <!-- Top Navigation -->
    <header class="bg-white sticky top-0 z-50 card-shadow">
      <div class="max-w-7xl mx-auto px-4">
        <!-- Top bar -->
        <div class="hidden md:flex items-center justify-between text-xs text-gray-500 py-1 border-b border-gray-100">
          <div class="flex gap-4">
            <span><i class="fas fa-map-marker-alt mr-1"></i>北京</span>
            <a href="#" class="hover:text-primary">手机版</a>
          </div>
          <div class="flex gap-4">
            <a @click.prevent="navigateTo(isLoggedIn ? 'user' : 'login')" class="hover:text-primary cursor-pointer">
              {{ isLoggedIn ? currentUser.nickname : '登录' }}
            </a>
            <a v-if="!isLoggedIn" @click.prevent="navigateTo('register')" class="hover:text-primary cursor-pointer">注册</a>
            <a @click.prevent="navigateTo('orders')" class="hover:text-primary cursor-pointer">我的订单</a>
            <a @click.prevent="navigateTo('user')" class="hover:text-primary cursor-pointer">会员中心</a>
            <a @click.prevent="navigateTo('message')" class="hover:text-primary cursor-pointer">留言板</a>
            <a v-if="isAdmin" @click.prevent="navigateTo('admin-dashboard')" class="hover:text-primary cursor-pointer text-primary font-medium">后台管理</a>
          </div>
        </div>
        <!-- Main nav -->
        <div class="flex items-center gap-4 py-3">
          <a @click.prevent="navigateTo('home')" class="flex items-center gap-2 cursor-pointer shrink-0">
            <div class="w-9 h-9 gradient-primary rounded-lg flex items-center justify-center text-white font-bold text-lg">优</div>
            <span class="text-xl font-bold text-gray-800 hidden sm:block">优品商城</span>
          </a>
          <div class="flex-1 max-w-2xl mx-auto relative">
            <input v-model="searchKeyword" @keyup.enter="doSearch" type="text" placeholder="搜索商品、品牌..."
                   class="w-full h-10 pl-4 pr-24 border-2 border-primary rounded-full text-sm focus:border-primary">
            <button @click="doSearch" class="absolute right-1 top-1 h-8 px-5 gradient-primary text-white rounded-full text-sm font-medium hover:opacity-90 transition">
              <i class="fas fa-search mr-1"></i>搜索
            </button>
          </div>
          <div class="flex items-center gap-3 shrink-0">
            <a @click.prevent="navigateTo('cart')" class="relative cursor-pointer p-2 text-gray-600 hover:text-primary transition">
              <i class="fas fa-shopping-cart text-xl"></i>
              <span v-if="cartTotalCount > 0" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">{{ cartTotalCount > 99 ? '99+' : cartTotalCount }}</span>
            </a>
            <button @click="mobileMenuOpen=!mobileMenuOpen" class="md:hidden p-2 text-gray-600"><i class="fas fa-bars text-xl"></i></button>
          </div>
        </div>
        <!-- Category nav -->
        <nav class="hidden md:flex items-center gap-6 py-2 border-t border-gray-100 text-sm">
          <a v-for="cat in categories" :key="cat.id" @click.prevent="filterByCategory(cat.id)" class="text-gray-600 hover:text-primary cursor-pointer transition whitespace-nowrap">
            <i :class="cat.icon" class="mr-1"></i>{{ cat.name }}
          </a>
        </nav>
      </div>
      <!-- Mobile menu -->
      <div v-if="mobileMenuOpen" class="md:hidden bg-white border-t px-4 py-3 space-y-2">
        <a v-for="cat in categories" :key="cat.id" @click.prevent="filterByCategory(cat.id); mobileMenuOpen=false"
           class="block py-2 px-3 text-sm text-gray-600 hover:bg-orange-50 hover:text-primary rounded-lg cursor-pointer">
          <i :class="cat.icon" class="mr-2 w-5 text-center"></i>{{ cat.name }}
        </a>
        <div class="border-t pt-2 mt-2 flex gap-2">
          <a @click.prevent="navigateTo(isLoggedIn?'user':'login'); mobileMenuOpen=false" class="flex-1 text-center py-2 text-sm bg-orange-50 text-primary rounded-lg cursor-pointer">
            {{ isLoggedIn ? '个人中心' : '登录' }}
          </a>
          <a @click.prevent="navigateTo('orders'); mobileMenuOpen=false" class="flex-1 text-center py-2 text-sm bg-orange-50 text-primary rounded-lg cursor-pointer">我的订单</a>
        </div>
      </div>
    </header>

    <!-- ===== HOME PAGE ===== -->
    <main v-if="currentPage==='home'" class="max-w-7xl mx-auto px-4 py-4">
      <!-- Banner Carousel -->
      <div class="relative rounded-xl overflow-hidden mb-6 bg-gray-200" style="height: 380px;">
        <div v-for="(banner, idx) in banners" :key="idx" v-show="currentBanner===idx" class="absolute inset-0 transition-opacity duration-700"
             :style="{background: banner.bg}">
          <div class="h-full flex items-center px-12">
            <div class="text-white max-w-lg">
              <h2 class="text-4xl font-bold mb-3">{{ banner.title }}</h2>
              <p class="text-lg mb-6 opacity-90">{{ banner.subtitle }}</p>
              <button @click="navigateTo('products')" class="px-8 py-3 bg-white text-primary rounded-full font-semibold hover:shadow-lg transition">
                立即抢购 <i class="fas fa-arrow-right ml-2"></i>
              </button>
            </div>
          </div>
        </div>
        <button @click="prevBanner" class="absolute left-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-white/30 hover:bg-white/50 rounded-full flex items-center justify-center text-white backdrop-blur transition">
          <i class="fas fa-chevron-left"></i>
        </button>
        <button @click="nextBanner" class="absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-white/30 hover:bg-white/50 rounded-full flex items-center justify-center text-white backdrop-blur transition">
          <i class="fas fa-chevron-right"></i>
        </button>
        <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2">
          <button v-for="(b, i) in banners" :key="i" @click="currentBanner=i"
                  class="w-3 h-3 rounded-full transition" :class="currentBanner===i ? 'bg-white scale-110' : 'bg-white/50'"></button>
        </div>
      </div>

      <!-- Categories Grid -->
      <div class="grid grid-cols-3 sm:grid-cols-6 gap-4 mb-8">
        <a v-for="cat in categories" :key="cat.id" @click.prevent="filterByCategory(cat.id)"
           class="flex flex-col items-center gap-2 p-4 bg-white rounded-xl card-shadow card-hover cursor-pointer group">
          <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl transition-transform group-hover:scale-110"
               :style="{background: cat.color + '20', color: cat.color}">
            <i :class="cat.icon"></i>
          </div>
          <span class="text-sm text-gray-700 font-medium">{{ cat.name }}</span>
        </a>
      </div>

      <!-- Flash Sale -->
      <div class="bg-white rounded-xl p-6 mb-8 card-shadow">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-3">
            <h2 class="text-xl font-bold"><i class="fas fa-bolt text-yellow-500 mr-2"></i>限时秒杀</h2>
            <div class="flex gap-1 text-sm">
              <span class="bg-gray-900 text-white px-2 py-1 rounded font-mono">{{ flashCountdown.hours }}</span>
              <span class="text-gray-900 font-bold">:</span>
              <span class="bg-gray-900 text-white px-2 py-1 rounded font-mono">{{ flashCountdown.minutes }}</span>
              <span class="text-gray-900 font-bold">:</span>
              <span class="bg-gray-900 text-white px-2 py-1 rounded font-mono">{{ flashCountdown.seconds }}</span>
            </div>
          </div>
          <a @click.prevent="navigateTo('products')" class="text-primary text-sm cursor-pointer hover:underline">更多 <i class="fas fa-angle-right"></i></a>
        </div>
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4">
          <div v-for="p in flashSaleProducts" :key="p.id" @click="viewProduct(p.id)" class="cursor-pointer card-hover bg-gray-50 rounded-lg overflow-hidden">
            <div class="product-img-wrap aspect-square bg-gray-100">
              <img :src="p.image" :alt="p.name" class="w-full h-full object-cover" loading="lazy">
              <span class="absolute top-2 left-2 tag bg-red-500 text-white font-bold">秒杀</span>
            </div>
            <div class="p-3">
              <p class="text-sm line-clamp-1 mb-1">{{ p.name }}</p>
              <div class="flex items-baseline gap-2">
                <span class="price-color font-bold text-lg">¥{{ p.price }}</span>
                <span class="text-gray-400 text-xs line-through">¥{{ p.originalPrice }}</span>
              </div>
              <div class="mt-2 bg-red-100 rounded-full h-4 relative overflow-hidden">
                <div class="h-full bg-gradient-to-r from-red-500 to-orange-400 rounded-full" :style="{width: p.salePercent + '%'}"></div>
                <span class="absolute inset-0 text-center text-xs text-red-700 font-medium leading-4">已抢{{ p.salePercent }}%</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Recommended -->
      <div class="mb-8">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-xl font-bold"><i class="fas fa-thumbs-up text-primary mr-2"></i>为您推荐</h2>
          <a @click.prevent="navigateTo('products')" class="text-primary text-sm cursor-pointer hover:underline">查看更多 <i class="fas fa-angle-right"></i></a>
        </div>
        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
          <div v-for="p in recommendedProducts" :key="p.id" @click="viewProduct(p.id)" class="bg-white rounded-xl overflow-hidden card-shadow card-hover cursor-pointer group">
            <div class="product-img-wrap aspect-square bg-gray-100 relative">
              <img :src="p.image" :alt="p.name" class="w-full h-full object-cover" loading="lazy">
              <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors flex items-center justify-center">
                <button @click.stop="addToCart(p)" class="opacity-0 group-hover:opacity-100 px-4 py-2 bg-white text-primary rounded-full text-sm font-medium shadow-lg transform translate-y-4 group-hover:translate-y-0 transition-all duration-300">
                  <i class="fas fa-cart-plus mr-1"></i>加入购物车
                </button>
              </div>
              <span v-if="p.tag" class="absolute top-2 left-2 tag text-white font-medium"
                    :class="p.tag==='新品' ? 'bg-green-500' : p.tag==='热销' ? 'bg-red-500' : 'bg-blue-500'">{{ p.tag }}</span>
            </div>
            <div class="p-4">
              <p class="text-sm line-clamp-2 mb-2 text-gray-800 group-hover:text-primary transition">{{ p.name }}</p>
              <div class="flex items-baseline gap-2 mb-1">
                <span class="price-color font-bold text-xl">¥{{ p.price }}</span>
                <span v-if="p.originalPrice" class="text-gray-400 text-xs line-through">¥{{ p.originalPrice }}</span>
              </div>
              <div class="flex items-center justify-between text-xs text-gray-400">
                <span>月销 {{ p.sales }}+</span>
                <span><i class="fas fa-star text-yellow-400"></i> {{ p.rating }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Hot & New sections -->
      <div class="grid md:grid-cols-2 gap-6 mb-8">
        <div class="bg-white rounded-xl p-6 card-shadow">
          <h3 class="text-lg font-bold mb-4 flex items-center"><i class="fas fa-fire text-red-500 mr-2"></i>热销爆款</h3>
          <div class="space-y-3">
            <div v-for="(p, idx) in hotProducts.slice(0,5)" :key="p.id" @click="viewProduct(p.id)"
                 class="flex items-center gap-3 p-2 rounded-lg hover:bg-orange-50 cursor-pointer transition">
              <span class="w-6 h-6 rounded flex items-center justify-center text-xs font-bold text-white shrink-0"
                    :class="idx < 3 ? 'bg-red-500' : 'bg-gray-400'">{{ idx + 1 }}</span>
              <img :src="p.image" class="w-12 h-12 rounded-lg object-cover shrink-0">
              <div class="flex-1 min-w-0">
                <p class="text-sm line-clamp-1">{{ p.name }}</p>
                <div class="flex items-center gap-2">
                  <span class="price-color font-bold">¥{{ p.price }}</span>
                  <span class="text-xs text-gray-400">销量 {{ p.sales }}</span>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="bg-white rounded-xl p-6 card-shadow">
          <h3 class="text-lg font-bold mb-4 flex items-center"><i class="fas fa-sparkles text-green-500 mr-2"></i>新品上市</h3>
          <div class="space-y-3">
            <div v-for="(p, idx) in newProducts.slice(0,5)" :key="p.id" @click="viewProduct(p.id)"
                 class="flex items-center gap-3 p-2 rounded-lg hover:bg-green-50 cursor-pointer transition">
              <span class="w-6 h-6 rounded flex items-center justify-center text-xs font-bold bg-green-500 text-white shrink-0">新</span>
              <img :src="p.image" class="w-12 h-12 rounded-lg object-cover shrink-0">
              <div class="flex-1 min-w-0">
                <p class="text-sm line-clamp-1">{{ p.name }}</p>
                <div class="flex items-center gap-2">
                  <span class="price-color font-bold">¥{{ p.price }}</span>
                  <span class="tag bg-green-100 text-green-600">新品</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- ===== PRODUCTS LIST PAGE ===== -->
    <main v-if="currentPage==='products'" class="max-w-7xl mx-auto px-4 py-4">
      <!-- Breadcrumb -->
      <div class="text-sm text-gray-500 mb-4 flex items-center gap-2">
        <a @click.prevent="navigateTo('home')" class="hover:text-primary cursor-pointer">首页</a>
        <i class="fas fa-angle-right text-xs"></i>
        <span class="text-gray-800">{{ selectedCategoryName || '全部商品' }}</span>
        <span v-if="searchKeyword"> > 搜索"{{ searchKeyword }}"</span>
      </div>
      <div class="flex gap-6">
        <!-- Sidebar Filters -->
        <aside class="hidden lg:block w-60 shrink-0">
          <div class="bg-white rounded-xl p-4 card-shadow sticky top-32 space-y-5">
            <div>
              <h4 class="font-semibold mb-3 text-sm">商品分类</h4>
              <div class="space-y-1">
                <a v-for="cat in [{id:0,name:'全部分类',icon:'fas fa-th'},...categories]" :key="cat.id"
                   @click.prevent="filterCategory=cat.id; loadProducts()"
                   class="flex items-center gap-2 py-2 px-3 rounded-lg text-sm cursor-pointer transition"
                   :class="filterCategory===cat.id ? 'bg-orange-50 text-primary font-medium' : 'text-gray-600 hover:bg-gray-50'">
                  <i :class="cat.icon" class="w-4 text-center"></i>{{ cat.name }}
                </a>
              </div>
            </div>
            <div>
              <h4 class="font-semibold mb-3 text-sm">价格区间</h4>
              <div class="space-y-2">
                <a v-for="range in priceRanges" :key="range.label" @click.prevent="filterPriceRange=range; loadProducts()"
                   class="block py-1.5 px-3 rounded text-sm cursor-pointer transition"
                   :class="filterPriceRange===range ? 'bg-orange-50 text-primary' : 'text-gray-600 hover:bg-gray-50'">{{ range.label }}</a>
              </div>
              <div class="flex items-center gap-2 mt-2">
                <input v-model.number="filterPriceMin" type="number" placeholder="最低" class="w-full border rounded-lg px-2 py-1.5 text-sm">
                <span class="text-gray-400">-</span>
                <input v-model.number="filterPriceMax" type="number" placeholder="最高" class="w-full border rounded-lg px-2 py-1.5 text-sm">
                <button @click="applyPriceFilter" class="px-3 py-1.5 bg-primary text-white rounded-lg text-sm shrink-0">确定</button>
              </div>
            </div>
            <div>
              <h4 class="font-semibold mb-3 text-sm">筛选</h4>
              <label class="flex items-center gap-2 text-sm text-gray-600 mb-2 cursor-pointer">

      });
    }
    function setDefaultAddress(id) {
      addresses.value.forEach(a => a.isDefault = (a.id === id));
      showToast('已设为默认地址', 'success');
    }

    // ========== MESSAGES ==========
    const messages = ref([
      { id: 1, user: '小明同学', content: '这个商城太棒了！商品质量好，发货也快，下次还来！', time: '2024-10-15 14:30', likes: 23, liked: false, isAdmin: false, replies: [{ id: 1, content: '感谢您的支持！祝您购物愉快~ 😊' }], showReply: false, replyText: '' },
      { id: 2, user: '花花', content: '请问你们的退货政策是什么样的？买了一件衣服尺码不合适想退换。', time: '2024-10-14 10:22', likes: 8, liked: false, isAdmin: false, replies: [{ id: 2, content: '您好，我们支持7天无理由退换货哦，请在"我的订单"中申请退换即可~' }], showReply: false, replyText: '' },
      { id: 3, user: '大壮哥', content: '刚入手的耳机音质超赞！降噪效果也很好，在地铁上终于可以安静听歌了。', time: '2024-10-13 18:45', likes: 45, liked: false, isAdmin: false, replies: [], showReply: false, replyText: '' },
      { id: 4, user: '小丽', content: '建议增加更多护肤品品牌，现在选择有点少~', time: '2024-10-12 09:15', likes: 12, liked: false, isAdmin: false, replies: [{ id: 3, content: '感谢您的宝贵建议！我们正在积极引入更多优质品牌，敬请期待~ 🎉' }], showReply: false, replyText: '' },
    ]);
    const newMessage = ref('');

    function postMessage() {
      if (!isLoggedIn.value) { showToast('请先登录', 'warning'); navigateTo('login'); return; }
      if (!newMessage.value.trim()) return;
      messages.value.unshift({
        id: Date.now(), user: currentUser.value.nickname, content: newMessage.value.trim(),
        time: new Date().toLocaleString('zh-CN'), likes: 0, liked: false, isAdmin: currentUser.value.role === 'admin',
        replies: [], showReply: false, replyText: ''
      });
      newMessage.value = '';
      showToast('留言发表成功', 'success');
    }

    function toggleLikeMessage(msg) { msg.liked = !msg.liked; msg.likes += msg.liked ? 1 : -1; }

    function replyToMessage(msg) {
      if (!msg.replyText?.trim()) return;
      msg.replies.push({ id: Date.now(), content: msg.replyText.trim() });
      msg.replyText = '';
      msg.showReply = false;
      showToast('回复成功', 'success');
    }

    function deleteMessage(id) {
      showModal('删除留言', '确定删除这条留言吗？', 'confirm', () => {
        messages.value = messages.value.filter(m => m.id !== id);
        showToast('留言已删除', 'info');
      });
    }

    function adminReplyMessage(msg) {
      const reply = prompt('请输入回复内容：');
      if (reply?.trim()) {
        msg.replies.push({ id: Date.now(), content: reply.trim() });
        showToast('回复成功', 'success');
      }
    }

    // ========== CHAT ==========
    const chatOpen = ref(false);
    const chatInput = ref('');
    const chatMessages = ref([
      { type: 'system', text: '欢迎来到优品商城在线客服，有什么可以帮您的？' },
      { from: 'agent', text: '您好！我是智能客服小优，很高兴为您服务~ 😊 您可以问我关于商品、订单、退换货等问题哦！' },
    ]);
    const quickQuestions = ['怎么退货？', '发货时间？', '有优惠券吗？', '支付方式', '转人工'];

    const autoReplies = {
      '退货': '我们支持7天无理由退换货，请在"我的订单"中找到对应订单，点击"申请退换"即可。退款将在审核通过后1-3个工作日内到账。',
      '发货': '下单后我们会在24小时内发货（周末及节假日顺延），一般2-5天送达。您可以在"我的订单"中查看物流信息。',
      '优惠': '当前活动：新用户注册送100积分，满199减20，满399减50！更多优惠请关注首页活动~',
      '支付': '我们支持微信支付、支付宝、银联卡等多种支付方式，安全便捷！',
      '人工': '正在为您转接人工客服，请稍候... 当前排队人数：2人，预计等待时间：3分钟。',
      '你好': '您好！很高兴为您服务，请问有什么可以帮助您的？😊',
      '谢谢': '不客气！如果还有其他问题随时可以问我哦~ 祝您购物愉快！🎉',
    };

    function sendChatMessage(text) {
      if (!text?.trim()) return;
      chatMessages.value.push({ from: 'user', text: text.trim() });
      chatInput.value = '';
      setTimeout(() => {
        let reply = '感谢您的咨询！如需更多帮助，可以描述您的具体问题，或输入"人工"转接人工客服哦~';
        for (const [key, val] of Object.entries(autoReplies)) {
          if (text.includes(key)) { reply = val; break; }
        }
        chatMessages.value.push({ from: 'agent', text: reply });
      }, 800);
    }

    // ========== ADMIN ==========
    const adminMenus = [
      { key: 'admin-dashboard', label: '仪表盘', icon: 'fas fa-tachometer-alt' },
      { key: 'admin-products', label: '商品管理', icon: 'fas fa-box-open' },
      { key: 'admin-orders', label: '订单管理', icon: 'fas fa-clipboard-list', badge: 3 },
      { key: 'admin-users', label: '用户管理', icon: 'fas fa-users' },
      { key: 'admin-stats', label: '数据统计', icon: 'fas fa-chart-bar' },
      { key: 'admin-messages', label: '留言管理', icon: 'fas fa-comments' },
    ];

    // Dashboard
    const dashboardStats = computed(() => [
      { label: '今日销售额', value: '¥12,580', icon: 'fas fa-yen-sign', gradient: 'gradient-primary', trend: 12.5 },
      { label: '订单总数', value: allOrders.value.length.toString(), icon: 'fas fa-shopping-bag', gradient: 'gradient-blue', trend: 8.3 },
      { label: '注册用户', value: mockUsers.value.length.toString(), icon: 'fas fa-users', gradient: 'gradient-green', trend: 15.2 },
      { label: '商品总数', value: allProducts.value.length.toString(), icon: 'fas fa-boxes', gradient: 'gradient-purple', trend: -2.1 },
    ]);

    const chartPeriod = ref('7天');
    let salesChartInstance = null;
    let pieChartInstance = null;

    function initDashboardCharts() {
      // Sales Chart
      const salesEl = document.getElementById('salesChart');
      if (salesEl) {
        if (salesChartInstance) salesChartInstance.destroy();
        const labels = chartPeriod.value === '7天'
          ? ['周一','周二','周三','周四','周五','周六','周日']
          : Array.from({length: 30}, (_, i) => `${i+1}日`);
        const data1 = labels.map(() => Math.floor(Math.random() * 5000 + 3000));
        const data2 = labels.map(() => Math.floor(Math.random() * 80 + 30));
        salesChartInstance = new Chart(salesEl, {
          type: 'line',
          data: {
            labels,
            datasets: [
              { label: '销售额(¥)', data: data1, borderColor: '#FF6B35', backgroundColor: 'rgba(255,107,53,0.1)', fill: true, tension: 0.4, yAxisID: 'y' },
              { label: '订单量', data: data2, borderColor: '#007AFF', backgroundColor: 'rgba(0,122,255,0.1)', fill: true, tension: 0.4, yAxisID: 'y1' }
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { position: 'top' } },
            scales: { y: { position: 'left', grid: { display: false } }, y1: { position: 'right', grid: { drawOnChartArea: false } } }
          }
        });
      }
      // Pie Chart
      const pieEl = document.getElementById('orderPieChart');
      if (pieEl) {
        if (pieChartInstance) pieChartInstance.destroy();
        pieChartInstance = new Chart(pieEl, {
          type: 'doughnut',
          data: {
            labels: ['待支付','待发货','待收货','已完成','已取消'],
            datasets: [{ data: [
              allOrders.value.filter(o=>o.status==='pending').length,
              allOrders.value.filter(o=>o.status==='paid').length,
              allOrders.value.filter(o=>o.status==='shipped').length,
              allOrders.value.filter(o=>o.status==='completed').length,
              allOrders.value.filter(o=>o.status==='cancelled').length
            ], backgroundColor: ['#FF9500','#007AFF','#AF52DE','#34C759','#8E8E93'] }]
          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
        });
      }
    }

    watch(chartPeriod, () => nextTick(() => initDashboardCharts()));

    // Stats page charts
    function initStatsCharts() {
      const catEl = document.getElementById('categorySalesChart');
      if (catEl) {
        new Chart(catEl, {
          type: 'pie',
          data: {
            labels: categories.value.map(c => c.name),
            datasets: [{ data: categories.value.map(() => Math.floor(Math.random() * 10000 + 2000)),
              backgroundColor: ['#007AFF','#FF6B35','#AF52DE','#34C759','#FF3B30','#FF9500'] }]
          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
        });
      }
      const userEl = document.getElementById('userGrowthChart');
      if (userEl) {
        new Chart(userEl, {
          type: 'line',
          data: {
            labels: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
            datasets: [{ label: '新增用户', data: [120,145,190,210,280,320,350,410,380,450,520,580],
              borderColor: '#34C759', backgroundColor: 'rgba(52,199,89,0.1)', fill: true, tension: 0.4 }]
          },
          options: { responsive: true, maintainAspectRatio: false }
        });
      }
      const revEl = document.getElementById('revenueChart');
      if (revEl) {
        new Chart(revEl, {
          type: 'bar',
          data: {
            labels: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
            datasets: [
              { label: '销售额', data: [85000,72000,98000,110000,95000,128000,135000,142000,118000,155000,168000,180000],
                backgroundColor: 'rgba(255,107,53,0.8)', borderRadius: 6 },
              { label: '利润', data: [25000,21000,29000,33000,28000,38000,40000,42000,35000,46000,50000,54000],
                backgroundColor: 'rgba(0,122,255,0.8)', borderRadius: 6 }
            ]
          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } } }
        });
      }
    }

    // Admin Products
    const adminProductSearch = ref('');
    const adminProductCategory = ref('');
    const adminProductStatus = ref('');
    const showProductForm = ref(false);
    const editingProduct = ref(null);
    const productForm = reactive({ name: '', categoryId: '', brand: '', price: '', originalPrice: '', stock: '', image: '', description: '' });

    const adminFilteredProducts = computed(() => {
      let list = [...allProducts.value];
      if (adminProductSearch.value) list = list.filter(p => p.name.includes(adminProductSearch.value));
      if (adminProductCategory.value) list = list.filter(p => p.categoryId === Number(adminProductCategory.value));
      return list;
    });

    function openProductForm(product = null) {
      editingProduct.value = product;
      if (product) { Object.assign(productForm, { name: product.name, categoryId: product.categoryId, brand: product.brand || '', price: product.price, originalPrice: product.originalPrice || '', stock: product.stock, image: product.image, description: product.description || '' }); }
      else { Object.assign(productForm, { name: '', categoryId: '', brand: '', price: '', originalPrice: '', stock: '', image: '', description: '' }); }
      showProductForm.value = true;
    }

    function saveProduct() {
      if (editingProduct.value) {
        Object.assign(editingProduct.value, {
          name: productForm.name, categoryId: Number(productForm.categoryId), brand: productForm.brand,
          price: Number(productForm.price), originalPrice: Number(productForm.originalPrice) || null,
          stock: Number(productForm.stock), image: productForm.image || productImages[0], description: productForm.description
        });
        showToast('商品已更新', 'success');
      } else {
        allProducts.value.push({
          id: allProducts.value.length + 100,
          name: productForm.name, categoryId: Number(productForm.categoryId), brand: productForm.brand,
          price: Number(productForm.price), originalPrice: Number(productForm.originalPrice) || null,
          stock: Number(productForm.stock), image: productForm.image || productImages[Math.floor(Math.random() * productImages.length)],
          images: [productForm.image || productImages[0]], description: productForm.description,
          sales: 0, reviews: 0, rating: 5.0, tag: '新品', active: true
        });
        showToast('商品已添加', 'success');
      }
      showProductForm.value = false;
    }

    function deleteProduct(id) {
      showModal('删除商品', '确定删除这个商品吗？此操作不可恢复。', 'confirm', () => {
        allProducts.value = allProducts.value.filter(p => p.id !== id);
        showToast('商品已删除', 'info');
      });
    }

    // Admin Orders
    const adminOrderSearch = ref('');
    const adminOrderStatus = ref('');
    const adminFilteredOrders = computed(() => {
      let list = [...allOrders.value];
      if (adminOrderSearch.value) list = list.filter(o => o.orderNo.includes(adminOrderSearch.value) || o.userName?.includes(adminOrderSearch.value));
      if (adminOrderStatus.value) list = list.filter(o => o.status === adminOrderStatus.value);
      return list;
    });

    const orderAdminStats = computed(() => [
      { label: '全部订单', value: allOrders.value.length, color: '#333' },
      { label: '待发货', value: allOrders.value.filter(o => o.status === 'paid').length, color: '#007AFF' },
      { label: '待收货', value: allOrders.value.filter(o => o.status === 'shipped').length, color: '#AF52DE' },
      { label: '已完成', value: allOrders.value.filter(o => o.status === 'completed').length, color: '#34C759' },
    ]);

    // Admin Users
    const adminUserSearch = ref('');
    const adminFilteredUsers = computed(() => {
      let list = [...mockUsers.value];
      if (adminUserSearch.value) list = list.filter(u => u.username.includes(adminUserSearch.value) || u.nickname.includes(adminUserSearch.value) || u.email.includes(adminUserSearch.value));
      return list;
    });

    // ========== UTILITIES ==========
    function stringToColor(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
      const colors = ['#FF6B35','#007AFF','#34C759','#AF52DE','#FF3B30','#FF9500','#5AC8FA','#64D2FF'];
      return colors[Math.abs(hash) % colors.length];
    }

    return {
      // Routing
      currentPage, navigateTo, mobileMenuOpen, adminSidebarOpen,
      // Toast & Modal
      toasts, showToast, modal, showModal,
      // Auth
      currentUser, isLoggedIn, isAdmin, loginForm, registerForm, showPassword, loginLoading, passwordStrength,
      handleLogin, handleRegister, handleLogout, checkAuth,
      // Categories
      categories, getCategoryName,
      // Products
      allProducts, recommendedProducts, hotProducts, newProducts, topProducts, flashSaleProducts, flashCountdown,
      // Banner
      banners, currentBanner, nextBanner, prevBanner,
      // Product listing
      searchKeyword, filterCategory, filterPriceRange, filterPriceMin, filterPriceMax,
      filterInStock, filterOnSale, currentSort, currentPageNum, pageSize,
      priceRanges, sortOptions, selectedCategoryName, filteredProducts, totalPages, paginatedProducts,
      doSearch, filterByCategory, applyPriceFilter, resetFilters, loadProducts,
      // Product detail
      currentProduct, currentImageIndex, detailQuantity, detailTab, selectedSpecs, mockReviews,
      viewProduct, selectSpec, getProductById,
      // Cart
      cartItems, cartSelectAll, cartTotalCount, cartSelectedCount, cartSelectedAmount,
      addToCart, removeFromCart, updateCartQuantity, toggleSelectAll, removeSelectedFromCart, buyNow, goCheckout,
      // Favorites
      favorites, isFavorite, toggleFavorite,
      // Orders
      allOrders, myOrders, orderTabKey, orderSearch, orderTabs, filteredOrders,
      orderStatusClass, payOrder, confirmReceive, shipOrder, reorderFromOrder, viewOrderDetail,
      // User center
      userTab, profileForm, showPasswordModal, showAddressForm, editingAddress, addressForm,
      userMenuItems, userStats, quickActions,
      saveProfile, addresses, editAddress, saveAddress, deleteAddress, setDefaultAddress,
      // Messages
      messages, newMessage, postMessage, toggleLikeMessage, replyToMessage, deleteMessage, adminReplyMessage,
      // Chat
      chatOpen, chatInput, chatMessages, quickQuestions, sendChatMessage,
      // Admin
      adminMenus, dashboardStats, chartPeriod,
      adminProductSearch, adminProductCategory, adminProductStatus, showProductForm, editingProduct, productForm,
      adminFilteredProducts, openProductForm, saveProduct, deleteProduct,
      adminOrderSearch, adminOrderStatus, adminFilteredOrders, orderAdminStats,
      adminUserSearch, adminFilteredUsers, mockUsers,
      // Utilities
      stringToColor,
    };
  }
}).mount('#app');
</script>
</body>
</html>
